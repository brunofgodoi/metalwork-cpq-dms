services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cpq_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-cpq_metalurgica}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-cpq_admin} -d ${POSTGRES_DB:-cpq_metalurgica}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${IMAGE_PREFIX:-brunofgodoi/projetoextensaoi}/api:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3333:3333'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cpq_admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-cpq_metalurgica}?schema=public
      PORT: '3333'
      JWT_SECRET: ${JWT_SECRET:-super-secret}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:80}
    volumes:
      - uploads:/app/uploads

  web:
    image: ghcr.io/${IMAGE_PREFIX:-brunofgodoi/projetoextensaoi}/web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'

volumes:
  pgdata:
  uploads:
