services:
  db:
    image: postgres:18-alpine
    container_name: cpq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cpq_admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: cpq_metalurgica
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cpq_admin -d cpq_metalurgica']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpq-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3333:3333'
    environment:
      DATABASE_URL: postgresql://cpq_admin:admin123@db:5432/cpq_metalurgica?schema=public
      PORT: '3333'
      JWT_SECRET: super-secret
      NODE_ENV: production
      FRONTEND_URL: http://localhost:80
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cpq-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'

volumes:
  pgdata:
  uploads:
